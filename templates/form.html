<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistleblowing System Sederhana</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        form { background: #f4f4f4; padding: 20px; border-radius: 8px; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, textarea, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Form Pengaduan Anonim (UAS)</h2>
    <form action="/" method="POST">
        <div class="group">
            <label for="kategori">Kategori Pelanggaran:</label>
            <select name="kategori" id="kategori">
                <option value="Fasilitas">Penyalahgunaan Fasilitas</option>
                <option value="Pungli">Pungutan Liar</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>
        <div class="group">
            <label for="laporan">Isi Laporan:</label>
            <textarea name="laporan" id="laporan" rows="5" required placeholder="Ketik laporan Anda di sini..."></textarea>
        </div>
        <button type="submit">Kirim Laporan</button>
    </form>
</body>
</html>
