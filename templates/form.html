<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIU Whistleblowing</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        /* Menggunakan Gambar Pilihanmu Sebagai Latar Belakang Penuh */
        body { 
            background: url('/static/background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Special Elite', monospace; 
            margin: 0;
            padding: 0;
            color: #dec897; 
            min-height: 100vh;
            display: table;
            width: 100%;
        }

        /* Container Pembungkus Utama */
        .main-container {
            display: table-cell;
            vertical-align: middle;
            padding: 40px 60px;
        }

        /* Menggeser Judul dan Form Secara Total ke Sisi Kanan */
        .content-wrapper {
            margin-left: auto;
            margin-right: 40px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h2 {
            font-family: 'Cinzel', serif;
            text-align: center;
            color: #d3a625; 
            text-shadow: 3px 3px 8px #000, 0 0 15px rgba(211, 166, 37, 0.7);
            margin-bottom: 25px;
            font-size: 20px;
        }

        /* Desain Form Efek Kartu 3D Mengambang di Sebelah Kanan */
        form { 
            background: rgba(242, 230, 206, 0.92); /* Sedikit transparan agar background menyatu */
            padding: 30px; 
            border-radius: 8px; 
            border: 3px double #740001; 
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.7), 0px 0px 25px rgba(211, 166, 37, 0.2);
            color: #2b1d0c; 
            transform: perspective(1000px) rotateY(-3deg);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        /* Efek Interaksi 3D saat Kursor Mendekat */
        form:hover {
            transform: perspective(1000px) rotateY(0deg) translateY(-5px);
            box-shadow: 0px 30px 60px rgba(0, 0, 0, 0.9), 0px 0px 35px rgba(211, 166, 37, 0.4);
        }

        .group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: bold; 
            font-family: 'Cinzel', serif;
            font-size: 12px;
            color: #740001;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 11px; 
            box-sizing: border-box; 
            background: #fffbf2;
            border: 1px solid #b3935d;
            font-family: 'Special Elite', monospace;
            font-size: 13px;
            border-radius: 4px;
            color: #2b1d0c;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #740001;
            background: #ffffff;
            box-shadow: 0 0 8px rgba(116, 0, 1, 0.4);
        }

        .crypto-divider {
            border-top: 2px dashed #740001;
            margin: 20px 0 15px 0;
            padding-top: 8px;
            text-align: center;
            font-family: 'Cinzel', serif;
            color: #740001;
            font-size: 13px;
            font-weight: bold;
        }

        button { 
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #740001 0%, #9e1316 100%);
            color: #d3a625; 
            border: 2px solid #d3a625; 
            font-size: 15px; 
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer; 
            border-radius: 4px;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 5px 15px rgba(116, 0, 1, 0.3);
            transition: all 0.3s ease;
        }

        button:hover { 
            background: linear-gradient(135deg, #d3a625 0%, #f1cc63 100%);
            color: #740001; 
            border-color: #740001;
            box-shadow: 0 5px 20px rgba(211, 166, 37, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="content-wrapper">
            <h2>⚡ MATHEMATICS ⚡<br>Whistleblowing System</h2>
            <form action="/" method="POST">
                
                <div class="group">
                    <label for="nim_mahasiswa">🔒 NIM Anda (Akan Dienkripsi AES):</label>
                    <input type="text" id="nim_mahasiswa" name="nim_mahasiswa" required placeholder="Contoh: 2200101034">
                </div>

                <div class="crypto-divider">📋 Data Objek yang Dilaporkan</div>

                <div class="group">
                    <label for="nama_dosen">Nama Profesor / Dosen Terlaporkan:</label>
                    <input type="text" id="nama_dosen" name="nama_dosen" required placeholder="Contoh: Prof. Severus Snape">
                </div>

                <div class="group">
                    <label for="matkul">Mata Kuliah:</label>
                    <input type="text" id="matkul" name="matkul" required placeholder="Contoh: Ramuan Sihir B">
                </div>

                <div class="group">
                    <label for="kategori">Kategori Indikasi Pelanggaran:</label>
                    <select name="kategori" id="kategori">
                        <option value="Gratifikasi / Pungli Nilai">Gratifikasi / Pungli Nilai</option>
                        <option value="Ketidakadilan Akademik">Ketidakadilan Akademik / Ujian</option>
                        <option value="Penyalahgunaan Wewenang">Penyalahgunaan Wewenang Jabatan</option>
                    </select>
                </div>

                <div class="group">
                    <label for="kronologi">🔒 Kronologi Detail Laporan (Akan Dienkripsi AES):</label>
                    <textarea id="kronologi" name="kronologi" rows="4" required placeholder="Tuliskan kronologi pelanggaran rahasia di sini..."></textarea>
                </div>

                <button type="submit">Kirim Surat Kaleng Bersegel 🦉</button>
            </form>
        </div>
    </div>
</body>
</html>
