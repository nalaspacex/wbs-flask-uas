<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Dikirim via Burung Hantu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #1a0f0f; 
            background-image: radial-gradient(rgba(26, 15, 15, 0.8), #090505);
            font-family: 'Special Elite', monospace; 
            max-width: 550px; 
            margin: 50px auto; 
            padding: 20px; 
            color: #dec897;
            text-align: center;
        }
        .parchment-box { 
            background: #f2e6ce; 
            color: #2b1d0c; 
            padding: 35px; 
            border-radius: 4px; 
            border: 3px double #740001; 
            text-align: left;
            box-shadow: 0px 0px 20px rgba(211, 166, 37, 0.3);
            position: relative;
        }
        .parchment-box h3 {
            font-family: 'Cinzel', serif;
            color: #740001;
            margin-top: 0;
            text-align: center;
            border-bottom: 1px dashed #740001;
            padding-bottom: 10px;
        }
        .data-value {
            background: #fffbf2;
            padding: 10px;
            border-left: 3px solid #d3a625;
            margin: 10px 0;
            font-style: italic;
        }
        a { 
            display: inline-block; 
            margin-top: 25px; 
            color: #d3a625; 
            text-decoration: none; 
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 1px;
        }
        a:hover {
            color: #fff;
            text-shadow: 0 0 10px #d3a625;
        }
    </style>
</head>
<body>
    <div class="parchment-box">
        <h3>✉️ Laporan Telah Terbang!</h3>
        <p>Laporan Anda telah disegel secara magis dan sedang diantar oleh Burung Hantu Kementerian menuju tujuan secara rahasia.</p>
        
        <p><strong>Kategori Kasus:</strong></p>
        <div class="data-value">{{ kategori }}</div>
        
        <p><strong>Isi Surat Aduan:</strong></p>
        <div class="data-value">{{ laporan }}</div>
    </div>
    <a href="/">&larr; Kirim Surat Aduan Lain</a>
</body>
</html>
